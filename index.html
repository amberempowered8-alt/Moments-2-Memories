<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moments 2 Memories | Luxury Romantic Experiences — Sedona, AZ</title>
<meta name="description" content="Moments 2 Memories creates breathtaking luxury romantic experiences in Sedona & Verde Valley, Arizona. Custom ambiance, candles, and intentional setups for proposals, anniversaries, and curated couple getaways.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blush: #e8c4bc;
  --rose: #c9887a;
  --rose-dark: #a86d61;
  --gold: #c9a96e;
  --gold-light: #e8d5a3;
  --gold-pale: #f5edd8;
  --ivory: #faf6f1;
  --ivory-dark: #f2ece4;
  --charcoal: #2a2420;
  --charcoal-mid: #3d3330;
  --muted: #8a7a74;
  --muted-light: #b5a9a4;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--ivory);
  color: var(--charcoal);
  overflow-x: hidden;
}

/* ===================== NAV ===================== */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  padding: 24px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all 0.4s ease;
  background: rgba(42, 36, 32, 0.4);
  backdrop-filter: blur(8px);
}

nav.scrolled {
  background: rgba(250,246,241,0.95);
  backdrop-filter: blur(12px);
  padding: 14px 48px;
  box-shadow: 0 1px 0 rgba(201,168,110,0.2);
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--ivory);
  letter-spacing: 0.5px;
  text-decoration: none;
  transition: color 0.4s;
}

nav.scrolled .nav-logo { color: var(--charcoal); }

.nav-links {
  display: flex;
  gap: 36px;
  list-style: none;
}

.nav-links a {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-decoration: none;
  color: rgba(250,246,241,0.8);
  font-weight: 300;
  transition: color 0.3s;
}

nav.scrolled .nav-links a { color: var(--muted); }
.nav-links a:hover { color: var(--gold) !important; }

.nav-cta {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--gold) !important;
  border: 1px solid rgba(201,168,110,0.5);
  padding: 10px 22px;
  transition: all 0.3s ease;
}

.nav-cta:hover {
  background: var(--gold) !important;
  color: white !important;
  border-color: var(--gold);
}

/* ===================== HERO ===================== */
.hero {
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 900px;
  padding: 0 24px;
  margin: 140px auto 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 100%, rgba(201,136,122,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(201,168,110,0.15) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 80% 10%, rgba(232,196,188,0.12) 0%, transparent 50%),
    linear-gradient(160deg, #1a1210 0%, #2a2420 40%, #3a2820 70%, #2a1e1a 100%);
}

.glow-1, .glow-2, .glow-3 {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: glowPulse ease-in-out infinite;
}
.glow-1 {
  width: 300px; height: 300px;
  bottom: -50px; left: 15%;
  background: radial-gradient(circle, rgba(201,168,110,0.12) 0%, transparent 70%);
  animation-duration: 4s;
}
.glow-2 {
  width: 200px; height: 200px;
  top: 20%; right: 10%;
  background: radial-gradient(circle, rgba(201,136,122,0.1) 0%, transparent 70%);
  animation-duration: 5s; animation-delay: 1s;
}
.glow-3 {
  width: 400px; height: 400px;
  top: -100px; left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(232,196,188,0.06) 0%, transparent 70%);
  animation-duration: 6s; animation-delay: 2s;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: floatUp linear infinite;
  opacity: 0;
}
.particle:nth-child(1) { width:3px;height:3px;left:15%;background:rgba(201,168,110,0.4);animation-duration:8s;animation-delay:0s; }
.particle:nth-child(2) { width:2px;height:2px;left:30%;background:rgba(232,196,188,0.5);animation-duration:10s;animation-delay:2s; }
.particle:nth-child(3) { width:3px;height:3px;left:55%;background:rgba(201,168,110,0.3);animation-duration:9s;animation-delay:4s; }
.particle:nth-child(4) { width:2px;height:2px;left:70%;background:rgba(201,136,122,0.4);animation-duration:11s;animation-delay:1s; }
.particle:nth-child(5) { width:3px;height:3px;left:85%;background:rgba(232,196,188,0.4);animation-duration:7s;animation-delay:3s; }

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.5; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

.hero-eyebrow {
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 300;
  margin-bottom: 24px;
  animation: fadeUp 1s 0.3s both;
  opacity: 0;
  text-align: center;
}

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(38px, 6.5vw, 76px);
  font-weight: 300;
  color: var(--ivory);
  line-height: 1.3;
  letter-spacing: -0.5px;
  text-align: center;
  animation: fadeUp 1s 0.5s both;
  opacity: 0;
  padding: 10px 0;
  width: 100%;
}

.hero-title em {
  font-style: italic;
  color: var(--blush);
}

.hero-subtitle {
  margin-top: 24px;
  font-size: 14px;
  font-weight: 200;
  letter-spacing: 2px;
  color: rgba(250,246,241,0.6);
  line-height: 1.8;
  animation: fadeUp 1s 0.7s both;
  opacity: 0;
  text-align: center;
  max-width: 600px;
}

.hero-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin: 36px 0;
  animation: fadeUp 1s 0.9s both;
  opacity: 0;
}
.hero-divider-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,110,0.5)); }
.hero-divider-line.r { background: linear-gradient(90deg, rgba(201,168,110,0.5), transparent); }
.hero-divider span { color: var(--gold); font-size: 16px; }

.hero-actions {
  display: flex;
  gap: 16px;
  justify-content: center;
  animation: fadeUp 1s 1.1s both;
  opacity: 0;
}

.btn-primary {
  display: inline-block;
  padding: 16px 40px;
  background: var(--gold);
  color: var(--charcoal);
  text-decoration: none;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 500;
  transition: all 0.3s ease;
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(201,168,110,0.3); }

.btn-secondary {
  display: inline-block;
  padding: 16px 40px;
  border: 1px solid rgba(250,246,241,0.3);
  color: var(--ivory);
  text-decoration: none;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 300;
  transition: all 0.3s ease;
}
.btn-secondary:hover { border-color: var(--blush); color: var(--blush); transform: translateY(-2px); }

.hero-scroll {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  animation: fadeUp 1s 1.4s both;
  opacity: 0;
  z-index: 2;
}
.hero-scroll span { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(250,246,241,0.4); }
.scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, rgba(201,168,110,0.5), transparent); animation: scrollLine 2s ease-in-out infinite; }
@keyframes scrollLine { 0%,100%{opacity:0.3;transform:scaleY(1)} 50%{opacity:1;transform:scaleY(1.2)} }

section { position: relative; }

.section-eyebrow {
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 300;
  margin-bottom: 16px;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 5vw, 58px);
  font-weight: 300;
  color: var(--charcoal);
  line-height: 1.1;
}

.section-title em { font-style: italic; color: var(--rose); }

/* ===================== ABOUT ===================== */
.about {
  padding: 120px 0;
  background: var(--ivory);
  overflow: hidden;
}

.about-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 48px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.about-visual { position: relative; }

.about-img-frame {
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, var(--charcoal-mid) 0%, var(--charcoal) 100%);
  position: relative;
  overflow: hidden;
}

.about-img-frame::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 70%, rgba(201,136,122,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 70% 20%, rgba(201,168,110,0.15) 0%, transparent 50%);
}

.about-img-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: rgba(250,246,241,0.3);
}

.about-img-placeholder .icon { font-size: 48px; opacity: 0.4; }
.about-img-placeholder p { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }

.about-accent-box {
  position: absolute;
  bottom: -24px;
  right: -24px;
  width: 120px;
  height: 120px;
  border: 1px solid rgba(201,168,110,0.4);
  background: var(--ivory);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.about-accent-box .number {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 300;
  color: var(--gold);
  line-height: 1;
}

.about-accent-box .label {
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}

.about-corner {
  position: absolute;
  top: -16px;
  left: -16px;
  width: 60px;
  height: 60px;
  border-top: 2px solid var(--gold);
  border-left: 2px solid var(--gold);
}

.about-text { padding-right: 20px; }
.about-text .section-title { margin-bottom: 28px; }

.about-text p {
  font-size: 15px;
  font-weight: 300;
  line-height: 1.9;
  color: var(--muted);
  margin-bottom: 20px;
}

.about-text p strong { color: var(--charcoal); font-weight: 400; }

.about-founders {
  display: flex;
  gap: 24px;
  margin-top: 36px;
  padding-top: 36px;
  border-top: 1px solid rgba(201,168,110,0.2);
}

.founder {
  display: flex;
  align-items: center;
  gap: 14px;
}

.founder-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blush), var(--rose));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-style: italic;
  color: white;
  flex-shrink: 0;
}

.founder-info .name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-style: italic;
  color: var(--charcoal);
}

.founder-info .title {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: 2px;
}

.founder-sep {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--blush), transparent);
  align-self: center;
}

/* ===================== SERVICES ===================== */
.services {
  padding: 120px 0;
  background: var(--charcoal);
  position: relative;
  overflow: hidden;
}

.services::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 0% 50%, rgba(201,168,110,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 100% 50%, rgba(201,136,122,0.06) 0%, transparent 60%);
}

.services-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 48px;
  position: relative;
}

.services-header {
  text-align: center;
  margin-bottom: 72px;
}

.services-header .section-title { color: var(--ivory); }
.services-header .section-title em { color: var(--blush); }

.services-header p {
  margin-top: 20px;
  font-size: 14px;
  font-weight: 200;
  letter-spacing: 1px;
  color: var(--muted-light);
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.8;
}

.packages-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}

.package-card {
  background: rgba(250,246,241,0.03);
  border: 1px solid rgba(201,168,110,0.1);
  padding: 48px 36px;
  position: relative;
  transition: all 0.4s ease;
  overflow: hidden;
}

.package-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}

.package-card:hover { background: rgba(250,246,241,0.06); transform: translateY(-4px); }
.package-card:hover::before { opacity: 1; }

.package-card.featured {
  background: rgba(201,168,110,0.08);
  border-color: rgba(201,168,110,0.3);
}

.package-card.featured::before { opacity: 1; }

.featured-badge {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid rgba(201,168,110,0.4);
  padding: 4px 10px;
}

.package-icon { font-size: 32px; margin-bottom: 20px; }

.package-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--ivory);
  margin-bottom: 8px;
}

.package-tagline {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
}

.package-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 300;
  color: var(--ivory);
  line-height: 1;
  margin-bottom: 4px;
}

.package-price span {
  font-size: 16px;
  color: var(--muted-light);
  font-family: 'Jost', sans-serif;
  font-weight: 200;
}

.package-price-note {
  font-size: 10px;
  color: var(--muted-light);
  letter-spacing: 1px;
  margin-bottom: 28px;
}

.package-divider {
  height: 1px;
  background: linear-gradient(90deg, rgba(201,168,110,0.3), transparent);
  margin-bottom: 28px;
}

.package-features {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 36px;
}

.package-features li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  font-weight: 300;
  color: var(--muted-light);
  line-height: 1.5;
}

.package-features li::before {
  content: '✦';
  color: var(--gold);
  font-size: 8px;
  margin-top: 4px;
  flex-shrink: 0;
}

.package-btn {
  display: block;
  text-align: center;
  padding: 14px 24px;
  border: 1px solid rgba(201,168,110,0.4);
  color: var(--gold);
  text-decoration: none;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

.package-btn:hover, .package-card.featured .package-btn {
  background: var(--gold);
  color: var(--charcoal);
  border-color: var(--gold);
}

.services-note {
  text-align: center;
  margin-top: 48px;
  font-size: 13px;
  font-weight: 300;
  color: var(--muted-light);
  letter-spacing: 1px;
}

.services-note a {
  color: var(--gold);
  text-decoration: none;
  border-bottom: 1px solid rgba(201,168,110,0.4);
  padding-bottom: 1px;
}

/* ===================== GALLERY ===================== */
.gallery {
  padding: 120px 0;
  background: var(--ivory-dark);
  overflow: hidden;
}

.gallery-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 48px;
}

.gallery-header {
  text-align: center;
  margin-bottom: 64px;
}

.gallery-header p {
  margin-top: 20px;
  font-size: 14px;
  font-weight: 300;
  color: var(--muted);
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.8;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-template-rows: repeat(2, 280px);
  gap: 12px;
}

.gallery-item {
  background: linear-gradient(135deg, var(--charcoal-mid), var(--charcoal));
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.4s ease;
}

.gallery-item:hover { transform: scale(0.98); }
.gallery-item:nth-child(1) { grid-column: span 5; grid-row: span 2; }
.gallery-item:nth-child(2) { grid-column: span 4; }
.gallery-item:nth-child(3) { grid-column: span 3; }
.gallery-item:nth-child(4) { grid-column: span 3; }
.gallery-item:nth-child(5) { grid-column: span 4; }

.gallery-item::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 30% 70%, rgba(201,136,122,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 70% 20%, rgba(201,168,110,0.12) 0%, transparent 50%);
}

.gallery-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: rgba(250,246,241,0.25);
}

.gallery-placeholder .icon { font-size: 36px; opacity: 0.5; }
.gallery-placeholder p { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }

.gallery-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(42,36,32,0.7) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.3s ease;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

.gallery-item:hover .gallery-overlay { opacity: 1; }

.gallery-overlay-text {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold-light);
}

.gallery-cta {
  text-align: center;
  margin-top: 48px;
}

.gallery-cta p {
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* ===================== BOOKING ===================== */
.booking {
  padding: 120px 0;
  background: var(--ivory);
  position: relative;
}

.booking::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90
