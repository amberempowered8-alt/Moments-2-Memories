<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moments 2 Memories | Luxury Romantic Architecture</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #1C1613;
            --cream-light: #F9F6F0;
            --gold-accent: #D4AF37;
            --gold-muted: #AA8C2C;
            --text-dark: #2C2520;
            --text-light: #EAE3D9;
            --panel-bg: #26201D;
            --input-bg: #221A17;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1, h2, h3, h4, .serif-font {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
        }

        /* Navigation Bar */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(28,22,19,0.95), rgba(28,22,19,0));
            z-index: 1000;
            border-bottom: 1px solid rgba(212,175,55,0.1);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: var(--text-light);
            text-decoration: none;
        }

        .nav-logo span {
            color: var(--gold-accent);
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.4s ease;
            opacity: 0.8;
        }

        .nav-links a:hover {
            color: var(--gold-accent);
            opacity: 1;
        }

        .cta-btn {
            border: 1px solid var(--gold-accent);
            padding: 10px 22px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold-accent);
            text-decoration: none;
            transition: all 0.4s ease;
            background: transparent;
            cursor: pointer;
        }

        .cta-btn:hover {
            background: var(--gold-accent);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(212,175,55,0.4);
        }

        /* Hero Canvas */
        .hero-canvas {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #1C1613 0%, #2A201A 50%, #1C1613 100%);
            padding: 0 20px;
            position: relative;
            border-bottom: 1px solid rgba(212,175,55,0.1);
        }

        .hero-canvas::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 1px;
            height: 80px;
            background: var(--gold-accent);
            opacity: 0.5;
        }

        .hero-title {
            font-size: 5.5rem;
            color: var(--text-light);
            letter-spacing: 4px;
            margin-bottom: 15px;
            animation: fadeIn 2s ease;
        }

        .hero-subtitle {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--gold-accent);
            font-weight: 300;
        }

        /* About Us Section */
        .identity-block {
            background-color: var(--cream-light);
            color: var(--text-dark);
            padding: 120px 10%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 80px;
            align-items: center;
        }

        .identity-visual {
            position: relative;
            border: 1px solid rgba(44,37,32,0.1);
            padding: 20px;
            background: #FFF;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .identity-visual img {
            width: 100%;
            height: auto;
            max-height: 350px;
            object-fit: contain;
        }

        .identity-text h2 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 30px;
            color: var(--text-dark);
        }

        .identity-text p {
            font-size: 0.95rem;
            margin-bottom: 40px;
            opacity: 0.85;
            font-weight: 300;
        }

        .profile-badges {
            display: flex;
            gap: 40px;
            border-top: 1px solid rgba(44,37,32,0.1);
            padding-top: 30px;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .badge-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #EADFC9;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 500;
            font-size: 0.85rem;
            border: 1px solid var(--gold-accent);
        }

        .badge-info h4 {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .badge-info span {
            font-size: 0.75rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Photos Section */
        .lookbook-section {
            padding: 120px 5%;
            background: #171210;
            border-top: 1px solid rgba(212,175,55,0.1);
        }

        .lookbook-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 50px;
        }

        .lookbook-item {
            position: relative;
            aspect-ratio: 4/5;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.1);
            background: var(--panel-bg);
        }

        .lookbook-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
            filter: contrast(102%) brightness(98%);
        }

        .lookbook-item:hover img {
            transform: scale(1.03);
        }

        .lookbook-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(to top, rgba(23,18,16,0.95), rgba(23,18,16,0));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .lookbook-overlay h4 {
            font-size: 1.6rem;
            color: var(--text-light);
            margin-bottom: 5px;
        }
        
        .lookbook-overlay p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold-accent);
            opacity: 0.9;
        }
