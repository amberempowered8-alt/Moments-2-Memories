<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Network | Moments 2 Memories</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #1C1613;
            --cream-light: #F9F6F0;
            --gold-accent: #D4AF37;
            --gold-muted: #AA8C2C;
            --text-dark: #2C2520;
            --text-light: #EAE3D9;
            --panel-bg: #26201D;
            --input-bg: #221A17;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(28, 22, 19, 0.95);
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: var(--text-light);
            text-decoration: none;
        }

        .nav-logo span {
            color: var(--gold-accent);
        }

        .back-link {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.4s ease;
            opacity: 0.8;
            border-bottom: 1px dashed rgba(212, 175, 55, 0.3);
            padding-bottom: 2px;
        }

        .back-link:hover {
            color: var(--gold-accent);
            opacity: 1;
            border-bottom-color: var(--gold-accent);
        }

        /* Content Header */
        .join-header {
            margin-top: 160px;
            text-align: center;
            padding: 0 20px;
            margin-bottom: 60px;
        }

        .join-header h1 {
            font-size: 4rem;
            color: var(--text-light);
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .join-header p {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--gold-accent);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Form Container */
        .directory-section {
            padding: 0 10% 120px 10%;
        }

        .directory-container {
            max-width: 750px;
            margin: 0 auto;
            background: var(--panel-bg);
            border: 1px solid rgba(212, 175, 55, 0.15);
            padding: 60px;
        }

        .directory-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gold-accent);
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            background: var(--input-bg);
            border: 1px solid rgba(212, 175, 55, 0.15);
            padding: 14px 18px;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            transition: all 0.4s ease;
            width: 100%;
        }

        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold-accent);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-group input[type="file"] {
            padding: 12px;
            cursor: pointer;
        }

        .form-group input[type="file"]::file-selector-button {
            background: var(--panel-bg);
            border: 1px solid var(--gold-accent);
            color: var(--gold-accent);
            padding: 5px 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 15px;
            transition: all 0.3s ease;
        }

        .submit-btn {
            background: transparent;
            border: 1px solid var(--gold-accent);
            padding: 16px 30px;
            color: var(--gold-accent);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.4s ease;
            margin-top: 15px;
        }

        .submit-btn:hover {
            background: var(--gold-accent);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        footer {
            padding: 60px 40px;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.4;
            border-top: 1px solid rgba(212, 175, 55, 0.05);
        }

        @media (max-width: 768px) {
            nav { padding: 20px; }
            .join-header h1 { font-size: 2.8rem; }
            .form-row { grid-template-columns: 1fr; gap: 25px; }
            .directory-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">M2M<span>.</span></a>
        <a href="index.html" class="back-link">← Back to Main</a>
    </nav>

    <header class="join-header">
        <h1>Join the Collective</h1>
        <p>Submit your enterprise to the Moments 2 Memories local economic networking alliance</p>
    </header>

    <section class="directory-section">
        <div class="directory-container">
            <!-- AIRTABLE EMBED STRATEGY -->
            <!-- Paste your Airtable Form Share Link inside the src attribute below -->
            <iframe 
                class="airtable-embed" 
                src="https://airtable.com/embed/appYOUR_DIRECTORY_FORM_ID?backgroundColor=transparent" 
                frameborder="0" 
                onmousewheel="" 
                width="100%" 
                height="750" 
                style="background: transparent; border: none;">
            </iframe>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Moments 2 Memories. All Rights Reserved.</p>
    </footer>

</body>
</html>
